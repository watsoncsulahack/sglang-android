name: Build proot ARM64 wheel

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: "Python version matching the proot environment"
        required: true
        default: "3.13"
  push:
    paths:
      - ".github/workflows/proot-arm64-wheel.yml"
      - "python/**"
      - "rust/sglang-grpc/**"
      - "proto/**"

permissions:
  contents: read

jobs:
  build-wheel:
    name: Build Linux ARM64 wheel
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version || '3.13' }}
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build setuptools setuptools-rust setuptools-scm wheel

      - name: Build SGLang wheel without runtime dependencies
        working-directory: python
        env:
          CARGO_TERM_COLOR: always
        run: |
          python -m build --wheel --no-isolation

      - name: Inspect wheel
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile

          wheels = sorted(Path("python/dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected exactly one wheel, found {wheels}")
          wheel = wheels[0]
          print(wheel)
          with zipfile.ZipFile(wheel) as zf:
              native = [name for name in zf.namelist() if name.endswith(".so")]
          print("native extensions:")
          for name in native:
              print(f"  {name}")
          if not any(name.endswith("sglang/srt/grpc/_core.so") for name in native):
              raise SystemExit("missing sglang.srt.grpc._core native extension")
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v5
        with:
          name: sglang-proot-arm64-wheel
          path: python/dist/*.whl
          if-no-files-found: error
