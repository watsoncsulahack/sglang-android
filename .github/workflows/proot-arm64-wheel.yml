name: Build proot ARM64 wheel

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: "Python version matching the proot environment"
        required: true
        default: "3.13"
  push:
    paths:
      - ".github/workflows/proot-arm64-wheel.yml"
      - "python/**"
      - "rust/sglang-grpc/**"
      - "proto/**"

permissions:
  contents: read

jobs:
  build-wheel:
    name: Build Linux ARM64 wheel
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version || '3.13' }}
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build setuptools setuptools-rust setuptools-scm wheel

      - name: Build SGLang wheel without runtime dependencies
        working-directory: python
        env:
          CARGO_TERM_COLOR: always
        run: |
          python -m build --wheel --no-isolation

      - name: Build source-only runtime dependency wheels
        env:
          CARGO_TERM_COLOR: always
        run: |
          python -m pip wheel --no-deps --wheel-dir python/dist outlines_core==0.1.26

      - name: Inspect wheels
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile

          wheels = {wheel.name: wheel for wheel in Path("python/dist").glob("*.whl")}
          if not wheels:
              raise SystemExit("no wheels found")
          for wheel in sorted(wheels.values()):
              print(wheel)

          sglang_wheels = [
              wheel for name, wheel in wheels.items() if name.startswith("sglang-")
          ]
          if len(sglang_wheels) != 1:
              raise SystemExit(f"expected exactly one sglang wheel, found {sglang_wheels}")
          with zipfile.ZipFile(sglang_wheels[0]) as zf:
              native = [name for name in zf.namelist() if name.endswith(".so")]
          print("native extensions:")
          for name in native:
              print(f"  {name}")
          if not any(
              name.startswith("sglang/srt/grpc/_core") and name.endswith(".so")
              for name in native
          ):
              raise SystemExit("missing sglang.srt.grpc._core native extension")
          if not any(name.startswith("outlines_core-") for name in wheels):
              raise SystemExit("missing outlines_core wheel")
          PY

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v5
        with:
          name: sglang-proot-arm64-wheels
          path: python/dist/*.whl
          if-no-files-found: error
